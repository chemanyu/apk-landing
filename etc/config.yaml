Name: apk-landing
Host: 0.0.0.0
Port: 5001

# 日志配置（go-zero logx）
# Mode: file 落地到文件 / console 输出到终端(systemd 用 journalctl 看)
# file 模式下日志写到 Path 目录：access.log / error.log / stat.log / severe.log
Log:
  Mode: file
  Path: logs
  Level: info
  Encoding: json     # json 便于后续按字段检索；想人读改成 plain
  KeepDays: 14       # 日志保留天数，自动清理
  Compress: true

# 路由前缀：nginx 用 proxy_pass 带尾斜杠会剥掉 /ulink，后端收到的路径已无前缀，故留空。
# 若改用「不带尾斜杠」的透传写法（后端能收到 /ulink），再填 /ulink。
URLPrefix: ""

# 关掉 go-zero 框架自带的 [HTTP] 访问日志中间件，只保留我们自己的结构化业务日志，
# 避免同一次访问打两条、access.log 混乱。
Middlewares:
  Log: false

# 京东 App 落地页配置
JD:
  Pkg: "com.jingdong.app.mall"
  Apk: "https://apk.360buyimg.com/build-cms/V13.2.6-99862-800003072-71739154-32bit.apk"
  IOSAppStore: "https://itunes.apple.com/cn/app/id414245413"
  # __LINK__ 会被 url 参数（媒体宏替换后的京东 CPS 链接）替换
  DeepLinkTpl: "openapp.jdmobile://virtual?params=%7B%22category%22%3A%22jump%22%2C%22des%22%3A%22m%22%2C%22url%22%3A%22__LINK__%22%7D"
  ULinkTpl: "https://linkst.m.jd.com/ul/ul.action?openApp.jdMobile://virtual?params=%7B%22category%22%3A%22jump%22%2C%22des%22%3A%22m%22%2C%22url%22%3A%22__LINK__%22%7D"
  DefaultBgImg: "https://landing.domobcdn.com/2022/image/jd/bgc2.jpg?imageMogr2/thumbnail/600x/strip/format/webp"
  ClickImg: "https://landing.domobcdn.com/2022/image/jd/click1.png?imageMogr2/thumbnail/500x/strip/format/webp"

# 唤端兜底策略
Fallback:
  DelayMs: 1000
